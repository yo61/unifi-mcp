version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns: ["*"]
    ignore:
      # Hold TypeScript on 6.x until the toolchain (ty, oxlint/tsgolint, tsx)
      # supports the 7.0 native compiler. Re-evaluate before removing.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      hooks:
        patterns: ["*"]
